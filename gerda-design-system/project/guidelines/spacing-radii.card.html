<!-- @dsCard group="Spacing" viewport="700x170" name="Radii & motion" subtitle="Near-square corners; slow cinematic easing" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg-base); font-family: var(--font-body); padding: 28px; }
  .wrap { display: flex; gap: 28px; align-items: center; }
  .grp { display: flex; gap: 16px; }
  .box { width: 64px; height: 64px; background: var(--bg-raised); border: 1px solid var(--border-hair); display:flex; align-items:flex-end; }
  .lab { color: var(--text-muted); font-size: 11px; padding: 6px; }
  .r0 { border-radius: 0; } .rxs { border-radius: 2px; } .rsm { border-radius: 4px; } .rp { border-radius: 999px; }
  .div { width: 1px; height: 80px; background: var(--border-hair); }
  .motion { color: var(--text-body); font-size: 13px; line-height: 1.7; }
  .motion b { color: var(--text-accent); font-weight: 500; }
  .mono { font-family: ui-monospace, monospace; color: var(--text-muted); font-size: 11px; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="grp">
      <div class="box r0"><span class="lab">0</span></div>
      <div class="box rxs"><span class="lab">2</span></div>
      <div class="box rsm"><span class="lab">4</span></div>
      <div class="box rp"><span class="lab">pill</span></div>
    </div>
    <div class="div"></div>
    <div class="motion">
      <b>Slow · cinematic · never bouncy</b><br/>
      <span class="mono">--ease-editorial: cubic-bezier(.22,1,.36,1)</span><br/>
      <span class="mono">--dur-cinema: 2.4s &nbsp; --dur-slow: 1.4s</span>
    </div>
  </div>
</body>
</html>
