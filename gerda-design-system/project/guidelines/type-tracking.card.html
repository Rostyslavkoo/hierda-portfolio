<!-- @dsCard group="Type" viewport="700x260" name="Letter-spacing — the signature" subtitle="Wide tracking is the editorial gesture" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg-base); font-family: var(--font-body); padding: 32px; }
  .r { padding: 10px 0; border-bottom: 1px solid var(--border-soft); }
  .r:last-child { border: none; }
  .lab { color: var(--text-muted); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 8px; }
  .w { color: var(--text-strong); font-family: var(--font-display); font-size: 28px; font-weight: 500; text-transform: uppercase; }
  .t-wide { letter-spacing: 0.08em; }
  .t-wider { letter-spacing: 0.18em; }
  .t-widest { letter-spacing: 0.34em; color: var(--text-accent); }
</style>
</head>
<body>
  <div class="r"><div class="lab">tracking-wide · 0.08em</div><div class="w t-wide">Gallery</div></div>
  <div class="r"><div class="lab">tracking-wider · 0.18em</div><div class="w t-wider">Editorial</div></div>
  <div class="r"><div class="lab">tracking-widest · 0.34em · wordmark</div><div class="w t-widest">Gerda</div></div>
</body>
</html>
