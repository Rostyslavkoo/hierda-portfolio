<!-- @dsCard group="Type" viewport="700x300" name="Display — Cormorant Garamond" subtitle="Editorial serif, the brand voice" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg-base); font-family: var(--font-body); padding: 32px; }
  .spec { font-family: var(--font-display); color: var(--text-strong); line-height: 1.05; }
  .r { display: flex; align-items: baseline; gap: 20px; padding: 6px 0; border-bottom: 1px solid var(--border-soft); }
  .lab { font-family: var(--font-body); color: var(--text-muted); font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; width: 110px; flex: none; }
  .a { font-size: 56px; font-weight: 500; letter-spacing: 0.02em; }
  .b { font-size: 38px; font-weight: 400; letter-spacing: 0.04em; }
  .c { font-size: 26px; font-weight: 300; font-style: italic; color: var(--text-accent); letter-spacing: 0.03em; }
</style>
</head>
<body>
  <div class="spec">
    <div class="r"><span class="lab">display-xxl</span><span class="a">Editorial</span></div>
    <div class="r"><span class="lab">display-xl</span><span class="b">Madrid, Spain</span></div>
    <div class="r" style="border:none"><span class="lab">italic 300</span><span class="c">a quiet kind of presence</span></div>
  </div>
</body>
</html>
