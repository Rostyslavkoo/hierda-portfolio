<!-- @dsCard group="Colors" viewport="700x180" name="Paper Neutrals" subtitle="Text tones, warm off-white through faint" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg-base); font-family: var(--font-body); }
  .wrap { display: flex; padding: 28px; gap: 14px; }
  .sw { flex: 1; }
  .chip { height: 64px; border-radius: var(--radius-sm); border: 1px solid var(--border-soft); }
  .name { color: var(--text-body); font-size: 12px; margin-top: 10px; letter-spacing: 0.04em; }
  .hex { color: var(--text-muted); font-size: 11px; margin-top: 2px; font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="sw"><div class="chip" style="background:#f4f1ee"></div><div class="name">paper-50 · strong</div><div class="hex">#F4F1EE</div></div>
    <div class="sw"><div class="chip" style="background:#cfc9c4"></div><div class="name">paper-200 · body</div><div class="hex">#CFC9C4</div></div>
    <div class="sw"><div class="chip" style="background:#8f8a86"></div><div class="name">paper-400 · muted</div><div class="hex">#8F8A86</div></div>
    <div class="sw"><div class="chip" style="background:#5f5b58"></div><div class="name">paper-600 · faint</div><div class="hex">#5F5B58</div></div>
  </div>
</body>
</html>
