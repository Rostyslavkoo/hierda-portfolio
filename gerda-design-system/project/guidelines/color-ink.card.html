<!-- @dsCard group="Colors" viewport="700x180" name="Ink & Canvas" subtitle="Near-black surfaces — the editorial stage" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg-base); font-family: var(--font-body); }
  .wrap { display: flex; padding: 28px; gap: 14px; }
  .sw { flex: 1; }
  .chip { height: 64px; border-radius: var(--radius-sm); border: 1px solid var(--border-soft); }
  .name { color: var(--text-body); font-size: 12px; margin-top: 10px; letter-spacing: 0.04em; }
  .hex { color: var(--text-muted); font-size: 11px; margin-top: 2px; font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="sw"><div class="chip" style="background:#0a0a0a"></div><div class="name">ink-1000</div><div class="hex">#0A0A0A</div></div>
    <div class="sw"><div class="chip" style="background:#0f0f0f"></div><div class="name">ink-950 · base</div><div class="hex">#0F0F0F</div></div>
    <div class="sw"><div class="chip" style="background:#161616"></div><div class="name">ink-900 · raised</div><div class="hex">#161616</div></div>
    <div class="sw"><div class="chip" style="background:#262626"></div><div class="name">ink-800 · inset</div><div class="hex">#262626</div></div>
    <div class="sw"><div class="chip" style="background:#333333"></div><div class="name">ink-700 · border</div><div class="hex">#333333</div></div>
  </div>
</body>
</html>
