<!-- @dsCard group="Type" viewport="700x260" name="Body — DM Sans" subtitle="Quiet, legible, geometric sans" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg-base); font-family: var(--font-body); padding: 32px; }
  .lead { color: var(--text-body); font-size: 17px; line-height: 1.6; max-width: 58ch; font-weight: 400; }
  .small { color: var(--text-muted); font-size: 13px; line-height: 1.6; margin-top: 16px; max-width: 58ch; }
  .meta { color: var(--text-faint); font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; margin-top: 18px; }
</style>
</head>
<body>
  <p class="lead">Represented in Madrid and working internationally across editorial, runway, and campaign. Body copy stays understated so the imagery carries the page.</p>
  <p class="small">Secondary text — captions, supporting notes, and form helper copy — sits at paper-400 to recede behind the lead.</p>
  <div class="meta">Eyebrow · Label · 0.18em tracking</div>
</body>
</html>
