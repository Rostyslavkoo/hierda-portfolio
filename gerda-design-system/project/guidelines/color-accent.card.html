<!-- @dsCard group="Colors" viewport="700x200" name="Dusty Rose Accent" subtitle="The single accent — used with restraint" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg-base); font-family: var(--font-body); }
  .wrap { padding: 28px; }
  .row { display: flex; gap: 14px; }
  .sw { flex: 1; }
  .chip { height: 56px; border-radius: var(--radius-sm); border: 1px solid var(--border-soft); }
  .name { color: var(--text-body); font-size: 12px; margin-top: 10px; letter-spacing: 0.04em; }
  .hex { color: var(--text-muted); font-size: 11px; margin-top: 2px; font-variant-numeric: tabular-nums; }
  .note { margin-top: 20px; color: var(--text-accent); font-family: var(--font-display); font-size: 22px; letter-spacing: 0.18em; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="row">
      <div class="sw"><div class="chip" style="background:#f5ece7"></div><div class="name">rose-50</div><div class="hex">#F5ECE7</div></div>
      <div class="sw"><div class="chip" style="background:#e2cabf"></div><div class="name">rose-200</div><div class="hex">#E2CABF</div></div>
      <div class="sw"><div class="chip" style="background:#c9a89a"></div><div class="name">rose-400 · accent</div><div class="hex">#C9A89A</div></div>
      <div class="sw"><div class="chip" style="background:#b8978a"></div><div class="name">rose-500 · hover</div><div class="hex">#B8978A</div></div>
      <div class="sw"><div class="chip" style="background:#6e544c"></div><div class="name">rose-700 · muted</div><div class="hex">#6E544C</div></div>
    </div>
    <div class="note">— the only color that isn't grey —</div>
  </div>
</body>
</html>
